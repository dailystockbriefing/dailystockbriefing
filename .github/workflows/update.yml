name: update-stock-brief

on:
  schedule:
    # GitHub Actions cron 은 UTC. 평일(월~금). 실제 발사는 수 분 지연될 수 있음.
    - cron: '30 6 * * 1-5'   # ~15:30 KST → KRX 마감(잠정 통합)
    - cron: '57 8 * * 1-5'   # ~17:57 KST → 공매도 잔고
    - cron: '5 11 * * 1-5'   # ~20:05 KST → NXT 마감(확정 통합)
  workflow_dispatch:
    inputs:
      mode:
        description: '수동 실행 모드'
        default: 'once'
        type: choice
        options: [once, invest, short, final]

permissions:
  contents: write

concurrency:
  group: stock-brief
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 24
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
      KIS_APPSECRET: ${{ secrets.KIS_APPSECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pykrx pandas requests

      # KIS 토큰(24h)을 실행 간 공유 — 발급 횟수를 하루 1회 수준으로 최소화
      - name: Restore KIS token
        uses: actions/cache@v4
        with:
          path: kis_token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-

      - name: Determine mode
        id: m
        run: |
          if   [ "${{ github.event.schedule }}" = "30 6 * * 1-5" ];  then echo "mode=invest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "57 8 * * 1-5" ];  then echo "mode=short"  >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5 11 * * 1-5" ];  then echo "mode=final"  >> "$GITHUB_OUTPUT"
          else echo "mode=${{ github.event.inputs.mode || 'invest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll & collect
        run: |
          case "${{ steps.m.outputs.mode }}" in
            once)  python poll.py --mode once ;;
            short) python poll.py --mode short  --interval 60 --max-minutes 16 ;;
            final) python poll.py --mode final  --interval 60 --max-minutes 20 ;;
            *)     python poll.py --mode invest --interval 30 --max-minutes 9  ;;
          esac

      - name: Commit data.json (변경분만)
        run: |
          git config user.name  "stock-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: ${{ steps.m.outputs.mode }} $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
