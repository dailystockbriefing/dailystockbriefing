name: update-stock-brief

on:
  schedule:
    # GitHub Actions cron 은 UTC. 평일(월~금).
    # 09:30 UTC ≈ 15:30 KST  → 투자자 동향 창(15:37~15:40) 직전 시작
    - cron: '30 6 * * 1-5'
    # 08:57 UTC ≈ 17:57 KST  → 공매도 잔고 창(18:00~18:10) 직전 시작
    - cron: '57 8 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '수동 실행 모드'
        default: 'invest'
        type: choice
        options: [invest, short]

permissions:
  contents: write

concurrency:
  group: stock-brief        # 두 창이 겹쳐도 동시 실행 방지
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # 안전장치 (폴링이 무한정 돌지 않도록)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pykrx pandas

      - name: Determine mode
        id: m
        run: |
          if   [ "${{ github.event.schedule }}" = "30 6 * * 1-5" ]; then echo "mode=invest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "57 8 * * 1-5" ]; then echo "mode=short"  >> "$GITHUB_OUTPUT"
          else echo "mode=${{ github.event.inputs.mode || 'invest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll & collect
        run: |
          if [ "${{ steps.m.outputs.mode }}" = "short" ]; then
            python poll.py --mode short  --interval 60 --max-minutes 16
          else
            python poll.py --mode invest --interval 30 --max-minutes 9
          fi

      - name: Commit data.json (변경분만)
        run: |
          git config user.name  "stock-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: ${{ steps.m.outputs.mode }} $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
